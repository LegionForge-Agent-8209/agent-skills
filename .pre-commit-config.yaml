# Local quality and security hooks for the agent-skills registry.
# This is adapted from LegionForge/dev-rig for a Markdown + small-Python repo.
#
# First-time setup:
#   pre-commit install
# Run manually:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: no-commit-to-branch
        args: [--branch, master, --branch, main]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(scripts/|skills/agent-skill-authoring/scripts/|tests/).*\.py$
      - id: ruff-format
        files: ^(scripts/|skills/agent-skill-authoring/scripts/|tests/).*\.py$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-q, -r, scripts, skills/agent-skill-authoring/scripts]
        files: ^(scripts/|skills/agent-skill-authoring/scripts/).*\.py$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
