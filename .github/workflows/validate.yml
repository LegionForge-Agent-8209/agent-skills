name: Validate Agent Skills

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    name: Validate skills and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate skill structure
        run: python3 scripts/validate_skills.py skills

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

      - name: Validate trigger eval JSON
        run: |
          python3 -m json.tool skills/agent-skill-authoring/assets/example-trigger-evals.json >/dev/null
          python3 -m json.tool skills/thoth-memory-backup-to-github/assets/example-trigger-evals.json >/dev/null
